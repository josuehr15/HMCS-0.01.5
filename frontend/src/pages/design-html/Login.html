<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMCS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   Login.css — HMCS Split 60 / 40 Layout
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.login-page {
    display: flex;
    flex-direction: row;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a1628;
    font-family: 'Inter', sans-serif;
}

/* LEFT PANEL — 60% */
.login-left {
    position: relative;
    width: 60%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #0a1628;
    background-image: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2b45 100%);
    background-size: cover;
    background-position: center center;
}

.login-left::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg,
            rgba(8, 12, 24, 0.80) 0%,
            rgba(42, 108, 149, 0.50) 100%);
    z-index: 0;
}

.login-left__inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 48px 60px;
    text-align: center;
}

.login-left__logo {
    width: 130px;
    height: 130px;
    object-fit: contain;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
    border: 2px solid rgba(255, 255, 255, 0.15);
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
}

.login-left__headline {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    line-height: 1;
    text-align: center;
    margin: 0;
}

.login-left__headline--top {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.70);
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 6px;
}

.login-left__headline--main {
    font-family: 'Montserrat', sans-serif;
    font-size: 4.5rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #FFFFFF 0%, #7EC8C8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.login-left__tagline-wrap {
    border-left: 3px solid #2A6C95;
    padding-left: 16px;
    text-align: left;
}

.login-left__tagline {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-style: italic;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.80);
    line-height: 1.7;
    letter-spacing: 0.2px;
    margin: 0;
}

.login-left__badges {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
}

.login-left__badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(42, 108, 149, 0.5);
    color: rgba(255, 255, 255, 0.85);
    padding: 9px 20px;
    border-radius: 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.25s ease;
    cursor: default;
}

.login-left__badge:hover {
    background: rgba(42, 108, 149, 0.25);
    border-color: #2A6C95;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(42, 108, 149, 0.30);
}

.login-left__line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right,
            transparent 0%,
            #2A6C95 35%,
            #08543D 65%,
            transparent 100%);
}

/* RIGHT PANEL — 40% */
.login-right {
    width: 40%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    background: rgba(4, 8, 20, 0.55);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border-left: 1px solid rgba(255, 255, 255, 0.10);
}

.login-form-container {
    width: 100%;
    max-width: 380px;
    padding: 48px 40px;
}

.login-form-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0;
}

.login-form-header__logo {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: contain;
    flex-shrink: 0;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    color: #fff;
}

.login-form-header__company {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
}

.login-form-header__sub {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.50);
    margin-top: 1px;
}

.login-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: #ffffff;
    margin: 32px 0 4px;
    letter-spacing: -0.3px;
}

.login-subtitle {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.50);
    margin: 0 0 24px;
}

.login-error {
    display: flex;
    align-items: center;
    gap: 9px;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.30);
    color: #FCA5A5;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
}

.login-group {
    margin-bottom: 16px;
}

.login-group label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.65);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 7px;
}

.login-field {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 12px;
    height: 50px;
    padding: 0 16px;
    transition: all 0.25s ease;
}

.login-field:focus-within {
    border-color: #2A6C95;
    background: rgba(42, 108, 149, 0.14);
    box-shadow: 0 0 0 3px rgba(42, 108, 149, 0.22);
}

.login-field__icon {
    color: rgba(255, 255, 255, 0.40);
    flex-shrink: 0;
    transition: color 0.2s;
}

.login-field:focus-within .login-field__icon {
    color: #64B5D9;
}

.login-field input {
    flex: 1;
    border: none;
    background: none;
    outline: none;
    color: #ffffff;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    padding: 0 12px;
}

.login-field input::placeholder {
    color: rgba(255, 255, 255, 0.28);
}

.login-field__toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.38);
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
}

.login-field__toggle:hover {
    color: #64B5D9;
    background: rgba(255, 255, 255, 0.08);
}

.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 18px 0 22px;
}

.login-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: rgba(255, 255, 255, 0.60);
    cursor: pointer;
    user-select: none;
    font-weight: 500;
}

.login-check input[type='checkbox'] {
    accent-color: #2A6C95;
    width: 15px;
    height: 15px;
    cursor: pointer;
    flex-shrink: 0;
}

.login-forgot {
    font-size: 0.82rem;
    color: #4A8CB5;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.15s;
}

.login-forgot:hover { color: #64B5D9; }

.login-btn {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #2A6C95 0%, #1E5270 100%);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(42, 108, 149, 0.40);
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
}

.login-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
    transition: left 0.5s;
}

.login-btn:hover:not(:disabled)::after { left: 150%; }
.login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42, 108, 149, 0.52); }
.login-btn:active:not(:disabled) { transform: translateY(0); box-shadow: 0 4px 14px rgba(42, 108, 149, 0.35); }
.login-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

.login-contact {
    text-align: center;
    margin-top: 20px;
    font-size: 0.82rem;
    color: rgba(255, 255, 255, 0.40);
    margin-bottom: 0;
}

.login-contact a { color: #4A8CB5; font-weight: 600; text-decoration: none; transition: color 0.15s; }
.login-contact a:hover { color: #64B5D9; }

.login-demo {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.72rem;
    color: rgba(255, 255, 255, 0.32);
    text-align: center;
    margin-top: 14px;
    font-family: 'Inter', monospace;
    letter-spacing: 0.02em;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .login-page { flex-direction: column; height: auto; min-height: 100vh; overflow: auto; }
    .login-left { width: 100%; height: 220px; flex-shrink: 0; }
    .login-left__headline--main { font-size: 1.8rem; }
    .login-left__tagline { display: none; }
    .login-left__logo { width: 80px; height: 80px; }
    .login-left__inner { gap: 16px; padding: 28px 24px; }
    .login-right { width: 100%; height: auto; flex: 1; overflow-y: auto; align-items: flex-start; border-left: none; border-top: 1px solid rgba(255, 255, 255, 0.08); }
    .login-form-container { padding: 32px 28px; }
}

@media (max-width: 400px) {
    .login-form-container { padding: 28px 20px; }
    .login-left__badges span { font-size: 0.72rem; padding: 6px 12px; }
}
</style>
</head>
<body>
<div class="login-page">

    <!-- LEFT PANEL — 60% brand panel -->
    <div class="login-left">
        <div class="login-left__inner">
            <!-- Logo placeholder -->
            <div class="login-left__logo">HM</div>

            <!-- Headline -->
            <h1 class="login-left__headline">
                <span class="login-left__headline--top">Skilled Technical</span>
                <span class="login-left__headline--main">Staffing</span>
            </h1>

            <!-- Tagline -->
            <div class="login-left__tagline-wrap">
                <p class="login-left__tagline">
                    Expert personnel for plumbing,<br>electrical, and HVAC services.
                </p>
            </div>

            <!-- Service badges -->
            <div class="login-left__badges">
                <span class="login-left__badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Electrical
                </span>
                <span class="login-left__badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2a5 5 0 0 1 5 5c0 3-5 9-5 9S7 10 7 7a5 5 0 0 1 5-5z"/>
                        <circle cx="12" cy="7" r="1.5"/>
                    </svg>
                    Plumbing
                </span>
                <span class="login-left__badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 22V12M12 12C12 12 8 8 8 5a4 4 0 0 1 8 0c0 3-4 7-4 7z"/>
                        <path d="M8 22h8"/>
                    </svg>
                    HVAC
                </span>
            </div>
        </div>

        <!-- Decorative bottom line -->
        <div class="login-left__line"></div>
    </div>

    <!-- RIGHT PANEL — 40% form panel -->
    <div class="login-right">
        <div class="login-form-container">

            <!-- Form header: small logo + company name -->
            <div class="login-form-header">
                <div class="login-form-header__logo">HM</div>
                <div>
                    <div class="login-form-header__company">HM Construction</div>
                    <div class="login-form-header__sub">Staffing LLLP</div>
                </div>
            </div>

            <!-- Title -->
            <h2 class="login-title">Bienvenido</h2>
            <p class="login-subtitle">Inicia sesion para continuar</p>

            <!-- Form -->
            <form onsubmit="return false;">

                <!-- Email -->
                <div class="login-group">
                    <label for="l-email">Correo electronico</label>
                    <div class="login-field">
                        <svg class="login-field__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input id="l-email" type="email" placeholder="admin@hmcs.com" value="admin@hmcs.com">
                    </div>
                </div>

                <!-- Password -->
                <div class="login-group">
                    <label for="l-pass">Contrasena</label>
                    <div class="login-field">
                        <svg class="login-field__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input id="l-pass" type="password" placeholder="••••••••" value="admin123">
                        <button type="button" class="login-field__toggle">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember + Forgot -->
                <div class="login-options">
                    <label class="login-check">
                        <input type="checkbox" checked>
                        Recordarme
                    </label>
                    <a href="#" class="login-forgot">Olvidaste tu contrasena?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="login-btn">Iniciar Sesion</button>
            </form>

            <!-- Contact admin -->
            <p class="login-contact">
                No tienes cuenta?
                <a href="#">Contactar Admin</a>
            </p>

            <!-- Demo -->
            <div class="login-demo">
                Demo: admin@hmcs.com / admin123
            </div>

        </div>
    </div>

</div>
</body>
</html>
